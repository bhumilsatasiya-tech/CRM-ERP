# /etc/nginx/sites-available/api.yourdomain.com.conf
#
# Laravel backend vhost. After SSL is issued by certbot, certbot rewrites this
# file to listen on 443 and adds an HTTP→HTTPS redirect. Don't edit the SSL
# block manually — let certbot manage it.

server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;

    root /var/www/crm-erp/backend/public;
    index index.php;

    charset utf-8;
    client_max_body_size 32M;          # for file uploads via Documents module

    # Real IP if behind Cloudflare. Uncomment + adjust if proxied.
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # ... (full Cloudflare IP list at https://www.cloudflare.com/ips/)
    # real_ip_header CF-Connecting-IP;

    # ---- Gzip ---------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # ---- Routing ------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Fan-out endpoints (Dashboard / IRM / EI) can take time on cold cache.
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 4 32k;
    }

    # Block access to dotfiles + Laravel's internal folders
    location ~ /\.(?!well-known) { deny all; }
    location ~ /(storage/framework|bootstrap/cache|vendor) { deny all; }

    # ---- Logging ------------------------------------------------------------
    access_log /var/log/nginx/api.yourdomain.com.access.log;
    error_log  /var/log/nginx/api.yourdomain.com.error.log warn;
}
