# /etc/nginx/sites-available/app.yourdomain.com.conf
#
# React SPA — serves the static `dist/` built by Vite. SPA fallback rewrites
# every non-asset request to /index.html so client-side routing works on hard
# reload of /any/deep/route.

server {
    listen 80;
    listen [::]:80;
    server_name app.yourdomain.com;

    root /var/www/crm-erp/frontend/dist;
    index index.html;

    charset utf-8;

    # ---- Gzip + Brotli ------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/wasm
        application/xml
        font/woff2
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # ---- Cache rules --------------------------------------------------------
    # Vite emits content-hashed assets in /assets/, safe to cache forever.
    location ~* ^/assets/.*\.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static (favicon, manifest) — cached but not immutable
    location ~* \.(?:png|jpg|jpeg|gif|webp|ico|svg|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---- SPA fallback -------------------------------------------------------
    # index.html itself is NOT cached aggressively — needs to pick up new
    # bundle hashes after every deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Security headers ---------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP — tighten as you add 3rd-party scripts. Defaults below allow the
    # bundle itself + the API + inline styles AntD injects + Google Fonts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.yourdomain.com wss://api.yourdomain.com; frame-ancestors 'self';" always;

    # ---- Logging ------------------------------------------------------------
    access_log /var/log/nginx/app.yourdomain.com.access.log;
    error_log  /var/log/nginx/app.yourdomain.com.error.log warn;
}
